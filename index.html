<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceHub - Suas Finanças</title>
    <!-- Chart.js para o gráfico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --input-bg: #f8fafc;
        }

        .dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #60a5fa;
            --primary-hover: #3b82f6;
            --success: #34d399;
            --danger: #f87171;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
            --input-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            transition: background 0.3s;
        }

        .app-container {
            max-width: 960px;
            width: 100%;
        }

        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text);
        }
        input, select, button {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.2px;
        }
        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--bg);
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 8px;
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .text-center {
            text-align: center;
        }
        .link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
            text-decoration: underline;
        }
        .hidden {
            display: none !important;
        }

        /* Dashboard cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .card-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .card-value {
            font-size: 24px;
            font-weight: 700;
        }
        .positive {
            color: var(--success);
        }
        .negative {
            color: var(--danger);
        }

        /* Tabela */
        .table-container {
            overflow-x: auto;
            margin: 20px 0;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
        }
        th {
            background: var(--bg);
            font-weight: 600;
            color: var(--text-secondary);
        }
        td {
            border-top: 1px solid var(--border);
        }
        .actions {
            display: flex;
            gap: 6px;
        }

        /* gráfico */
        .chart-wrapper {
            max-width: 400px;
            margin: 24px auto;
        }

        .toggle-theme {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            width: auto;
            color: var(--text);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .card-value {
                font-size: 20px;
            }
            .cards-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <!-- Tela de Login/Cadastro -->
        <div id="auth-screen">
            <div class="logo">💰 FinanceHub</div>
            <p class="subtitle" id="auth-subtitle">Faça login para continuar</p>
            <form id="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="auth-password" placeholder="********" required minlength="6">
                </div>
                <button type="submit" id="auth-btn">Entrar</button>
            </form>
            <p class="text-center" style="margin-top: 16px;">
                <span id="toggle-auth-text">Não tem conta?</span>
                <span class="link" id="toggle-auth-link">Cadastre-se</span>
            </p>
        </div>

        <!-- Dashboard (oculto inicialmente) -->
        <div id="dashboard-screen" class="app-container hidden">
            <header>
                <h2>📊 Dashboard</h2>
                <div class="flex-row">
                    <button id="theme-toggle" class="btn-outline btn-sm" style="width:auto;">🌓 Tema</button>
                    <button id="logout-btn" class="btn-outline btn-sm" style="width:auto;">Sair</button>
                </div>
            </header>

            <div class="cards-grid">
                <div class="card">
                    <div class="card-label">Saldo Atual</div>
                    <div class="card-value" id="saldo">R$ 0,00</div>
                </div>
                <div class="card">
                    <div class="card-label">Receitas</div>
                    <div class="card-value positive" id="total-receitas">R$ 0,00</div>
                </div>
                <div class="card">
                    <div class="card-label">Despesas</div>
                    <div class="card-value negative" id="total-despesas">R$ 0,00</div>
                </div>
            </div>

            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin: 24px 0;">
                <div style="flex:1; min-width: 250px;">
                    <h3>➕ Nova Receita</h3>
                    <form id="receita-form" class="form-group">
                        <input type="number" step="0.01" placeholder="Valor" id="r-valor" required>
                        <select id="r-categoria" required>
                            <option value="">Categoria</option>
                            <option>Salário</option>
                            <option>Freelance</option>
                            <option>Investimentos</option>
                            <option>Outros</option>
                        </select>
                        <input type="date" id="r-data" required>
                        <input type="text" placeholder="Descrição" id="r-descricao">
                        <button type="submit">Adicionar Receita</button>
                    </form>
                </div>
                <div style="flex:1; min-width: 250px;">
                    <h3>➖ Nova Despesa</h3>
                    <form id="despesa-form" class="form-group">
                        <input type="number" step="0.01" placeholder="Valor" id="d-valor" required>
                        <select id="d-categoria" required>
                            <option value="">Categoria</option>
                            <option>Alimentação</option>
                            <option>Transporte</option>
                            <option>Moradia</option>
                            <option>Lazer</option>
                            <option>Saúde</option>
                            <option>Outros</option>
                        </select>
                        <input type="date" id="d-data" required>
                        <input type="text" placeholder="Descrição" id="d-descricao">
                        <button type="submit">Adicionar Despesa</button>
                    </form>
                </div>
            </div>

            <div>
                <h3 style="margin-top: 20px;">📋 Movimentações</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Tipo</th>
                                <th>Valor</th>
                                <th>Categoria</th>
                                <th>Data</th>
                                <th>Descrição</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="transacoes-tbody"></tbody>
                    </table>
                </div>
            </div>

            <div class="chart-wrapper">
                <canvas id="grafico"></canvas>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Estado da aplicação
            const STATE = {
                usuarioLogado: null, // email
                transacoes: [],
                chartInstance: null,
                modoEscuro: false,
                telaCadastro: false,
                editandoId: null
            };

            // Elementos DOM
            const authScreen = document.getElementById('auth-screen');
            const dashboardScreen = document.getElementById('dashboard-screen');
            const authForm = document.getElementById('auth-form');
            const authEmail = document.getElementById('auth-email');
            const authPassword = document.getElementById('auth-password');
            const authBtn = document.getElementById('auth-btn');
            const authSubtitle = document.getElementById('auth-subtitle');
            const toggleAuthLink = document.getElementById('toggle-auth-link');
            const toggleAuthText = document.getElementById('toggle-auth-text');
            const themeToggle = document.getElementById('theme-toggle');
            const logoutBtn = document.getElementById('logout-btn');
            const receitaForm = document.getElementById('receita-form');
            const despesaForm = document.getElementById('despesa-form');
            const tbody = document.getElementById('transacoes-tbody');
            const saldoEl = document.getElementById('saldo');
            const totalReceitasEl = document.getElementById('total-receitas');
            const totalDespesasEl = document.getElementById('total-despesas');
            const graficoCanvas = document.getElementById('grafico');

            // Helpers localStorage
            function getUsuarios() {
                return JSON.parse(localStorage.getItem('financeiro_usuarios') || '[]');
            }
            function saveUsuarios(usuarios) {
                localStorage.setItem('financeiro_usuarios', JSON.stringify(usuarios));
            }
            function getTransacoes(email) {
                return JSON.parse(localStorage.getItem(`financeiro_transacoes_${email}`) || '[]');
            }
            function saveTransacoes(email, transacoes) {
                localStorage.setItem(`financeiro_transacoes_${email}`, JSON.stringify(transacoes));
            }

            // Modo escuro
            function aplicarTema() {
                document.body.classList.toggle('dark', STATE.modoEscuro);
            }
            function carregarTema() {
                const saved = localStorage.getItem('financeiro_tema');
                STATE.modoEscuro = saved === 'dark';
                aplicarTema();
            }
            themeToggle.addEventListener('click', () => {
                STATE.modoEscuro = !STATE.modoEscuro;
                aplicarTema();
                localStorage.setItem('financeiro_tema', STATE.modoEscuro ? 'dark' : 'light');
                // Re-renderiza gráfico se existir (cores)
                if (STATE.chartInstance && dashboardScreen.classList.contains('hidden') === false) {
                    atualizarGrafico();
                }
            });

            // Autenticação
            function mostrarAuth() {
                dashboardScreen.classList.add('hidden');
                authScreen.classList.remove('hidden');
                authForm.reset();
                atualizarTextosAuth();
            }

            function mostrarDashboard() {
                authScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                carregarTransacoes();
                atualizarUI();
            }

            function atualizarTextosAuth() {
                if (STATE.telaCadastro) {
                    authSubtitle.textContent = 'Crie sua conta';
                    authBtn.textContent = 'Cadastrar';
                    toggleAuthText.textContent = 'Já tem conta?';
                    toggleAuthLink.textContent = 'Faça login';
                } else {
                    authSubtitle.textContent = 'Faça login para continuar';
                    authBtn.textContent = 'Entrar';
                    toggleAuthText.textContent = 'Não tem conta?';
                    toggleAuthLink.textContent = 'Cadastre-se';
                }
            }

            toggleAuthLink.addEventListener('click', () => {
                STATE.telaCadastro = !STATE.telaCadastro;
                atualizarTextosAuth();
            });

            authForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = authEmail.value.trim().toLowerCase();
                const senha = authPassword.value.trim();

                if (!email || !senha || senha.length < 6) {
                    alert('Preencha email e senha (mínimo 6 caracteres).');
                    return;
                }

                const usuarios = getUsuarios();
                if (STATE.telaCadastro) {
                    // Cadastro
                    const existe = usuarios.find(u => u.email === email);
                    if (existe) {
                        alert('Email já cadastrado.');
                        return;
                    }
                    usuarios.push({ email, senha });
                    saveUsuarios(usuarios);
                    STATE.usuarioLogado = email;
                    mostrarDashboard();
                } else {
                    // Login
                    const usuario = usuarios.find(u => u.email === email && u.senha === senha);
                    if (!usuario) {
                        alert('Credenciais inválidas.');
                        return;
                    }
                    STATE.usuarioLogado = email;
                    mostrarDashboard();
                }
                STATE.telaCadastro = false;
            });

            logoutBtn.addEventListener('click', () => {
                STATE.usuarioLogado = null;
                STATE.transacoes = [];
                if (STATE.chartInstance) {
                    STATE.chartInstance.destroy();
                    STATE.chartInstance = null;
                }
                mostrarAuth();
            });

            // Transações
            function carregarTransacoes() {
                if (!STATE.usuarioLogado) return;
                STATE.transacoes = getTransacoes(STATE.usuarioLogado);
            }

            function salvarTransacoesLocal() {
                if (!STATE.usuarioLogado) return;
                saveTransacoes(STATE.usuarioLogado, STATE.transacoes);
            }

            function adicionarTransacao(tipo, valor, categoria, data, descricao) {
                const transacao = {
                    id: Date.now().toString(),
                    tipo, // 'receita' ou 'despesa'
                    valor: parseFloat(valor),
                    categoria,
                    data,
                    descricao: descricao || ''
                };
                STATE.transacoes.push(transacao);
                salvarTransacoesLocal();
                atualizarUI();
            }

            function excluirTransacao(id) {
                if (!confirm('Excluir este registro?')) return;
                STATE.transacoes = STATE.transacoes.filter(t => t.id !== id);
                salvarTransacoesLocal();
                atualizarUI();
            }

            function editarTransacao(id) {
                const t = STATE.transacoes.find(t => t.id === id);
                if (!t) return;
                // Preenche formulários baseado no tipo
                if (t.tipo === 'receita') {
                    document.getElementById('r-valor').value = t.valor;
                    document.getElementById('r-categoria').value = t.categoria;
                    document.getElementById('r-data').value = t.data;
                    document.getElementById('r-descricao').value = t.descricao;
                } else {
                    document.getElementById('d-valor').value = t.valor;
                    document.getElementById('d-categoria').value = t.categoria;
                    document.getElementById('d-data').value = t.data;
                    document.getElementById('d-descricao').value = t.descricao;
                }
                STATE.editandoId = id;
                // scroll suave para formulários
                window.scrollTo({ top: 200, behavior: 'smooth' });
            }

            function atualizarUI() {
                const receitas = STATE.transacoes.filter(t => t.tipo === 'receita').reduce((acc, t) => acc + t.valor, 0);
                const despesas = STATE.transacoes.filter(t => t.tipo === 'despesa').reduce((acc, t) => acc + t.valor, 0);
                const saldo = receitas - despesas;

                saldoEl.textContent = `R$ ${saldo.toFixed(2)}`;
                saldoEl.className = `card-value ${saldo >= 0 ? 'positive' : 'negative'}`;
                totalReceitasEl.textContent = `R$ ${receitas.toFixed(2)}`;
                totalDespesasEl.textContent = `R$ ${despesas.toFixed(2)}`;

                renderizarTabela();
                atualizarGrafico();
            }

            function renderizarTabela() {
                if (!STATE.transacoes.length) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">Nenhuma movimentação.</td></tr>`;
                    return;
                }
                const ordenadas = [...STATE.transacoes].sort((a, b) => new Date(b.data) - new Date(a.data));
                tbody.innerHTML = ordenadas.map(t => `
                    <tr>
                        <td>${t.tipo === 'receita' ? '🟢 Receita' : '🔴 Despesa'}</td>
                        <td class="${t.tipo === 'receita' ? 'positive' : 'negative'}">R$ ${t.valor.toFixed(2)}</td>
                        <td>${t.categoria}</td>
                        <td>${new Date(t.data + 'T00:00:00').toLocaleDateString('pt-BR')}</td>
                        <td>${t.descricao || '-'}</td>
                        <td class="actions">
                            <button class="btn-outline btn-sm" onclick="window.editarTransacao('${t.id}')">✏️</button>
                            <button class="btn-danger btn-sm" onclick="window.excluirTransacao('${t.id}')">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            }

            function atualizarGrafico() {
                const receitas = STATE.transacoes.filter(t => t.tipo === 'receita').reduce((acc, t) => acc + t.valor, 0);
                const despesas = STATE.transacoes.filter(t => t.tipo === 'despesa').reduce((acc, t) => acc + t.valor, 0);

                if (STATE.chartInstance) {
                    STATE.chartInstance.destroy();
                }

                const ctx = graficoCanvas.getContext('2d');
                const isDark = STATE.modoEscuro;
                STATE.chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Receitas', 'Despesas'],
                        datasets: [{
                            data: [receitas, despesas],
                            backgroundColor: [isDark ? '#34d399' : '#10b981', isDark ? '#f87171' : '#ef4444'],
                            borderColor: isDark ? '#1e293b' : '#ffffff',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: isDark ? '#f1f5f9' : '#1e293b'
                                }
                            }
                        }
                    }
                });
            }

            // Expõe funções para onclick dinâmico
            window.editarTransacao = editarTransacao;
            window.excluirTransacao = excluirTransacao;

            // Eventos formulários
            receitaForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const valor = document.getElementById('r-valor').value;
                const categoria = document.getElementById('r-categoria').value;
                const data = document.getElementById('r-data').value;
                const descricao = document.getElementById('r-descricao').value;
                if (!valor || !categoria || !data) {
                    alert('Preencha campos obrigatórios.');
                    return;
                }
                if (STATE.editandoId) {
                    // Editar
                    const t = STATE.transacoes.find(t => t.id === STATE.editandoId);
                    if (t) {
                        t.valor = parseFloat(valor);
                        t.categoria = categoria;
                        t.data = data;
                        t.descricao = descricao;
                        t.tipo = 'receita'; // garante tipo
                    }
                    STATE.editandoId = null;
                } else {
                    adicionarTransacao('receita', valor, categoria, data, descricao);
                }
                salvarTransacoesLocal();
                receitaForm.reset();
                atualizarUI();
            });

            despesaForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const valor = document.getElementById('d-valor').value;
                const categoria = document.getElementById('d-categoria').value;
                const data = document.getElementById('d-data').value;
                const descricao = document.getElementById('d-descricao').value;
                if (!valor || !categoria || !data) {
                    alert('Preencha campos obrigatórios.');
                    return;
                }
                if (STATE.editandoId) {
                    const t = STATE.transacoes.find(t => t.id === STATE.editandoId);
                    if (t) {
                        t.valor = parseFloat(valor);
                        t.categoria = categoria;
                        t.data = data;
                        t.descricao = descricao;
                        t.tipo = 'despesa';
                    }
                    STATE.editandoId = null;
                } else {
                    adicionarTransacao('despesa', valor, categoria, data, descricao);
                }
                salvarTransacoesLocal();
                despesaForm.reset();
                atualizarUI();
            });

            // Inicialização
            function init() {
                carregarTema();
                // Verifica se já existe usuário logado (poderia usar session, mas localStorage persiste)
                // Por segurança, sempre inicia na tela de auth
                mostrarAuth();
                // Se quiser manter logado, poderia salvar email no sessionStorage e pular auth
            }

            init();
        })();
    </script>
</body>
</html>
